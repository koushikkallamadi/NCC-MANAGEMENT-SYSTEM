<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery - NCC Management System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f4;
    }
    h1 {
      text-align: center;
      color: #0047AB;
      margin-bottom: 30px;
    }
    .gallery-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .gallery-box {
      background-color: white;
      border: 1px solid #ddd;
      width: calc(33.333% - 20px);
      box-sizing: border-box;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .gallery-box img {
      width: 100%;
      display: block;
    }
    .gallery-box:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    @media (max-width: 800px) {
      .gallery-box {
        width: calc(50% - 20px);
      }
    }
    @media (max-width: 500px) {
      .gallery-box {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>GALLERY PAGE OF JNTUA</h1>
  <div class="gallery-container">
    <!-- Each .gallery-box contains one image -->
    <div class="gallery-box">
